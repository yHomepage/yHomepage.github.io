<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人网站 - 首页</title>
    <style>
        /* 全局样式 */
        body {
            font-family: "微软雅黑", sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: white;
            transition: background 0.3s ease;
        }

        /* 新的导航栏整体样式（核心新增） */
        .nav-container {
            background-color: #f8f9fa; /* 浅灰背景，区分页面内容 */
            padding: 15px 20px; /* 上下左右内边距，避免内容挤边 */
            border-radius: 8px; /* 圆角，更美观 */
            margin: 20px 0; /* 上下外边距，和其他内容分开 */
        }

        /* 导航链接容器样式（核心新增） */
        .nav-container nav {
            display: flex; /* 横向排列链接 */
            align-items: center; /* 垂直居中 */
            gap: 12px; /* 链接和分隔符之间的间距，替代手动加空格 */
            font-size: 16px;
        }

        /* 导航链接样式（替换原有零散样式） */
        .nav-container a {
            color: #0066cc; /* 蓝色链接色，符合阅读习惯 */
            text-decoration: none; /* 去掉默认下划线 */
            padding: 5px 8px; /* 点击区域更大，更友好 */
        }

        /* 鼠标悬浮链接效果（替换原有样式） */
        .nav-container a:hover {
            color: #004999; /* 深色hover效果 */
            text-decoration: underline; /* 悬浮加下划线 */
        }

        /* 分隔符样式（替换原有样式） */
        .nav-container .separator {
            color: #999; /* 浅灰色分隔符，不抢视线 */
            font-size: 14px;
            margin: 0 !important; /* 覆盖原有margin，使用gap控制间距 */
        }

        /* 按钮样式 */
        button {
            margin-top: 20px;
            padding: 8px 16px;
            background: #1677ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #0d66e6;
        }
    </style>
</head>
<body>
    <h1>欢迎来到 Mr. Yang 的个人网站</h1>
    <style>
        <nav>{
            padding-left: 20px; /* 核心：首页前的空格（20px是示例，可改） */
        }
        nav a {
            text-decoration: none;
        color: #1677ff;
        }
        nav .separator {
            color: #999;
            margin: 0 8px; /* |前后的空格，可调整 */
        }
        nav a:hover {
            color: #0d66e6;
        }
    </style>
    <div class="nav-container">
        <nav>
            <a href="index.html">首页</a>
            <span class="separator">|</span>
            <a href="about.html">关于我</a>
            <span class="separator">|</span>
            <a href="contact.html">联系方式</a> <!-- 修复：| 前加空格，视觉更美观 -->
            <span class="separator">|</span>
            <!-- 优化：外部链接加 target="_blank"（新标签页打开）+ 安全属性 -->
            <a href="https://www.baidu.com" target="_blank" rel="noopener noreferrer">百度</a>
            <span class="separator">|</span>
            <a href="./天玄小说/ranking.html">小说排行榜</a>
        </nav>
    </div>
    <p>这是我的第一个HTML+CSS+JS网站～</p>
    <!-- 备注：需确保仓库images文件夹中有avatar.webp，否则图片会显示破碎 -->
    <img src="./images/avatar.webp" alt="我的头像" width="200">
    <button type="button" onclick="changeBg()">点击换背景</button>

    <script>
        // 优化：切换为对比明显的浅蓝色，且支持来回切换
        let isBgChanged = false;
        function changeBg() {
            if (!isBgChanged) {
                document.body.style.background = "#e6f7ff"; // 浅蓝色，对比明显
                alert("背景色已切换为浅蓝色！");
            } else {
                document.body.style.background = "white"; // 切回默认白色
                alert("背景色已恢复为默认白色！");
            }
            isBgChanged = !isBgChanged;
        }
    </script>
</body>
</html>
