
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人网站 - 首页</title>
    <style>
        /* 全局样式 */
        body {
            font-family: "微软雅黑", sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: white;
            transition: background 0.3s ease;
        }

        /* 导航栏整体样式（关键修改：宽度适配内容） */
        .nav-container {
            background-color: #f8f9fa; /* 浅灰背景 */
            padding: 15px 20px; /* 内边距 */
            border-radius: 8px; /* 圆角 */
            margin: 20px 0; /* 上下外边距 */
            /* 核心修改：让容器宽度只包裹内容，而不是撑满 */
            display: inline-block; /* 宽度适配内容 */
            /* 可选：如果需要左对齐，加这行；不加则居中 */
            /* text-align: left; */
        }

        /* 导航链接容器样式 */
        .nav-container nav {
            display: flex; /* 横向排列链接 */
            align-items: center; /* 垂直居中 */
            gap: 12px; /* 链接和分隔符之间的间距 */
            font-size: 16px;
        }

        /* 导航链接样式 */
        .nav-container a {
            color: #0066cc; /* 蓝色链接色 */
            text-decoration: none; /* 去掉默认下划线 */
            padding: 5px 8px; /* 点击区域更大 */
        }

        /* 鼠标悬浮链接效果 */
        .nav-container a:hover {
            color: #004999; /* 深色hover效果 */
            text-decoration: underline; /* 悬浮加下划线 */
        }

        /* 分隔符样式 */
        .nav-container .separator {
            color: #999; /* 浅灰色分隔符 */
            font-size: 14px;
            margin: 0 !important; /* 覆盖原有margin */
        }

        /* 按钮样式 */
        button {
            margin-top: 20px;
            padding: 8px 16px;
            background: #1677ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #0d66e6;
        }
    </style>
</head>
<body>
    <h1>欢迎来到 Mr. Yang 的个人网站</h1>
    
    <!-- 导航容器 -->
    <div class="nav-container">
        <nav>
            <a href="index.html">首页</a>
            <span class="separator">|</span>
            <a href="about.html">关于我</a>
            <span class="separator">|</span>
            <a href="contact.html">联系方式</a>
            <span class="separator">|</span>
            <a href="https://www.baidu.com" target="_blank" rel="noopener noreferrer">百度</a>
            <span class="separator">|</span>
            <a href="./天玄小说/ranking.html">小说排行榜</a>
        </nav>
    </div>

    <p>这是我的第一个HTML+CSS+JS网站～</p>
    <img src="./images/avatar.webp" alt="我的头像" width="200">
    <button type="button" onclick="changeBg()">点击换背景</button>

    <script>
        let isBgChanged = false;
        function changeBg() {
            if (!isBgChanged) {
                document.body.style.background = "#e6f7ff";
                alert("背景色已切换为浅蓝色！");
            } else {
                document.body.style.background = "white";
                alert("背景色已恢复为默认白色！");
            }
            isBgChanged = !isBgChanged;
        }
    </script>
</body>
</html>
