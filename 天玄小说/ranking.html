<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航栏示例</title>
    <style>
        /* 导航栏整体样式 */
        .nav-container {
            background-color: #f8f9fa; /* 浅灰背景，区分页面内容 */
            padding: 15px 20px; /* 上下左右内边距，避免内容挤边 */
            border-radius: 8px; /* 圆角，更美观 */
            margin: 20px 0; /* 上下外边距，和其他内容分开 */
        }
        /* 导航链接容器（消除默认间距） */
        .nav-container nav {
            display: flex; /* 横向排列链接 */
            align-items: center; /* 垂直居中 */
            gap: 12px; /* 链接和分隔符之间的间距，替代手动加空格 */
            font-size: 16px;
        }
        /* 导航链接样式 */
        .nav-container a {
            color: #0066cc; /* 蓝色链接色，符合阅读习惯 */
            text-decoration: none; /* 去掉默认下划线 */
            padding: 5px 8px; /* 点击区域更大，更友好 */
        }
        /* 鼠标悬浮链接效果 */
        .nav-container a:hover {
            color: #004999; /* 深色hover效果 */
            text-decoration: underline; /* 悬浮加下划线 */
        }
        /* 分隔符样式 */
        .separator {
            color: #999; /* 浅灰色分隔符，不抢视线 */
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- 导航栏外层容器（方便控制整体样式） -->
    <div class="nav-container">
        <nav>
            <a href="index.html">首页</a>
            <span class="separator">|</span>
            <a href="about.html">关于我</a>
            <span class="separator">|</span>
            <a href="contact.html">联系方式</a>
            <span class="separator">|</span>
            <!-- 外部链接：新标签页打开 + 安全属性 -->
            <a href="https://www.baidu.com" target="_blank" rel="noopener noreferrer">百度</a>
            <span class="separator">|</span>
            <!-- 修正路径：小说排行榜指向对应的文件（示例名） -->
            <a href="./天玄小说/ranking.html">小说排行榜</a>
        </nav>
    </div>
</body>
</html>
