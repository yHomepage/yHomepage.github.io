<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说排行榜 - 天玄小说</title>
    <style>
        /* 保留所有原有样式，无需修改 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f5f5f5;
            font-family: "微软雅黑", Arial, sans-serif;
            font-size: 16px;
            line-height: 1.8;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .page-title {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin: 30px 0;
            color: #222;
            border-bottom: 2px solid #ddd;
            padding-bottom: 15px;
        }
        .ranking-list {
            list-style: none;
            gap: 20px;
            display: flex;
            flex-direction: column;
        }
        .novel-item {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .novel-item:hover {
            transform: translateY(-5px);
        }
        .rank-num {
            display: inline-block;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
            background-color: #0066cc;
            color: #fff;
            border-radius: 50%;
            margin-right: 15px;
            font-weight: bold;
        }
        .novel-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .novel-title a {
            color: #0066cc;
            text-decoration: none;
        }
        .novel-title a:hover {
            text-decoration: underline;
        }
        .novel-info {
            color: #666;
            margin-left: 45px;
            line-height: 1.6;
        }
        .novel-info span {
            display: inline-block;
            margin-right: 20px;
        }
    </style>
</head>
<body>
    <h1 class="page-title">天玄小说排行榜</h1>
    <ul class="ranking-list">
        <!-- 第一名：添加 https:// 协议前缀，路径和能打开的地址完全一致 -->
        <li class="novel-item">
            <span class="rank-num">1</span>
            <div class="novel-title">
                <a href="https://yhomepage.github.io/天玄小说/都市神豪/chapter1.html">都市神豪</a>
            </div>
            <div class="novel-info">
                <span>作者：烽火戏诸侯</span>
                <span>状态：连载中</span>
                <p>简介：大千世界，无奇不有。我陈平安，唯有一剑，可搬山，可倒海，可降妖，可镇魔，可开天，可辟地...</p>
            </div>
        </li>

        <!-- 第二名：同理改成完整绝对网址（替换成你实际能打开的雪中悍刀行地址） -->
        <li class="novel-item">
            <span class="rank-num">2</span>
            <div class="novel-title">
                <a href="https://yhomepage.github.io/雪中悍刀行/chapter1.html">雪中悍刀行</a>
            </div>
            <div class="novel-info">
                <span>作者：烽火戏诸侯</span>
                <span>状态：完本</span>
                <p>简介：北凉王世子徐凤年，以纨绔形象著称于世，实则胸藏沟壑，腹有良谋。千里历练，三进三出，终成北凉王...</p>
            </div>
        </li>

        <!-- 第三名：按同样格式修改 -->
        <li class="novel-item">
            <span class="rank-num">3</span>
            <div class="novel-title">
                <a href="https://yhomepage.github.io/你的小说名/chapter1.html">你的小说名称</a>
            </div>
            <div class="novel-info">
                <span>作者：你的名字</span>
                <span>状态：连载中</span>
                <p>简介：你的小说简介内容...</p>
            </div>
        </li>
    </ul>
</body>
</html>
